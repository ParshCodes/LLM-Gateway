groups:
  - name: llm_gateway
    rules:

      # ── Latency degradation ─────────────────────────────────────────────
      - alert: HighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(llm_request_latency_seconds_bucket[5m])) by (le, model)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency is above 2 s for model {{ $labels.model }}"
          description: >
            The 95th-percentile end-to-end latency for model {{ $labels.model }}
            has exceeded 2 seconds for the last 5 minutes.
            Current value: {{ $value | humanizeDuration }}.

      # ── High error rate ─────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          sum(rate(llm_requests_total{status="error"}[5m])) by (model)
          /
          sum(rate(llm_requests_total[5m])) by (model) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 5 % for model {{ $labels.model }}"
          description: >
            More than 5 % of requests to model {{ $labels.model }} are failing.
            Current error rate: {{ $value | humanizePercentage }}.

      # ── Queue saturation ────────────────────────────────────────────────
      - alert: QueueNearlyFull
        expr: llm_queue_waiting > 40
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Request queue is nearly full ({{ $value }} waiting)"
          description: >
            The gateway request queue has {{ $value }} waiting requests.
            Capacity is 50. Consider scaling the model server.
