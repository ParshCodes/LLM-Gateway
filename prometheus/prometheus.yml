global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers: []   # wire up Alertmanager here when ready

scrape_configs:
  - job_name: llm_gateway
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
